name: KORA CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────
  # Backend : tests Python
  # ────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests — cycle mock
        run: python -m pytest tests/test_cycle_mock.py -v --tb=short

      - name: Run unit tests — LLM fallback
        run: python -m pytest tests/test_fallback_llm.py -v --tb=short

      - name: Accessibility audit (static)
        run: python tests/test_accessibility.py

  # ────────────────────────────────────────────────────────
  # Frontend : TypeScript + build Next.js
  # ────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Next.js 15)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      ADMIN_SECRET_KEY: ci_placeholder_secret_key_32chars__

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next.js build
        run: npm run build

      - name: Check for .env files accidentally committed
        run: |
          if git ls-files | grep -E '\.env$|\.env\.local$|\.env\.production$'; then
            echo "ERREUR: fichier .env committé dans le repo !"
            exit 1
          fi
          echo "OK: aucun .env committé"

  # ────────────────────────────────────────────────────────
  # Sécurité : scan secrets
  # ────────────────────────────────────────────────────────
  secrets-scan:
    name: Scan secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────
  # Deploy (main branch uniquement)
  # ────────────────────────────────────────────────────────
  # Vercel n'est plus utilisé pour le frontend — les anciens jobs
  # deploy-preview (100% Vercel) et l'étape de déploiement frontend de
  # deploy-production ont été retirés. TODO : ajouter ici la nouvelle étape
  # de déploiement frontend une fois l'hébergement de remplacement choisi.
  deploy-production:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, secrets-scan]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Backend redeploy → Render
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null -w "HTTP %{http_code}\n"
