name: kora
region: fra  # Frankfurt — meilleure latence pour l'Afrique de l'Ouest

services:
  # ── Backend FastAPI ──────────────────────────────────────────────────────
  - name: kora-backend
    source_dir: backend
    github:
      branch: main
      deploy_on_push: true
    environment_slug: python
    build_command: pip install -r requirements.txt
    run_command: uvicorn main:app --host 0.0.0.0 --port $PORT
    instance_size_slug: basic-xs   # 1 Go RAM, 1 vCPU — évite les OOM kills
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 30
    envs:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DEBUG
        value: "false"
      - key: WP_BASE_URL
        value: "https://kakilambe.com"
      - key: WP_USERNAME
        value: "kora_publisher"
      - key: CYCLE_TIMEZONE
        value: "Africa/Conakry"
      - key: CYCLE_HOUR
        value: "6"
      - key: GMAIL_RECIPIENT
        value: "mistermarcket@gmail.com"
      - key: LLM_PROVIDER_ORDER
        value: "groq,gemini,cerebras,openrouter"
      - key: LLM_PRIMARY_MODEL
        value: "groq/llama-3.3-70b-versatile"
      - key: IMAGE_GEN_PROVIDER
        value: "pollinations"
      # ── Secrets : à renseigner dans le Dashboard DO (onglet Environment Variables)
      - key: GROQ_API_KEY
        type: SECRET
      - key: GEMINI_API_KEY
        type: SECRET
      - key: CEREBRAS_API_KEY
        type: SECRET
      - key: OPENROUTER_API_KEY
        type: SECRET
      - key: TAVILY_API_KEY
        type: SECRET
      - key: WP_APP_PASSWORD
        type: SECRET
      - key: ADMIN_SECRET_KEY
        type: SECRET
      - key: API_SECRET_KEY
        type: SECRET
      - key: DATABASE_URL
        type: SECRET
      - key: REDIS_URL
        type: SECRET
      - key: ALLOWED_ORIGINS
        value: "https://kakilambe.com,https://kora-frontend.ondigitalocean.app"

  # ── Frontend Next.js ─────────────────────────────────────────────────────
  - name: kora-frontend
    source_dir: frontend
    github:
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    build_command: npm ci && npm run build
    run_command: npm start -- -p $PORT
    instance_size_slug: basic-xs
    instance_count: 1
    http_port: 3000
    health_check:
      http_path: /
      initial_delay_seconds: 30
    envs:
      - key: NODE_ENV
        value: "production"
      - key: NEXT_PUBLIC_API_URL
        value: "https://kora-backend.ondigitalocean.app"
