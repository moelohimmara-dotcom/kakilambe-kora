server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 20M;

    access_log /var/log/nginx/kora_access.log;
    error_log  /var/log/nginx/kora_error.log;

    location /api/webhooks/ {
        proxy_pass http://127.0.0.1:8000/api/webhooks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /api/settings, /api/providers, /api/agent/cancel sont des fonctionnalités
    # NORMALES de l'éditeur connecté (gestion des sources RSS, catégories,
    # prompts, statut des providers LLM) — pas des routes admin exclusives.
    # Basic Auth dessus cassait l'usage réel : tout appel fetch() du navigateur
    # vers une route 401 Basic déclenche la popup native, même en arrière-plan.
    # L'authentification applicative (cookie de session KORA) suffit ici.
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Panneau système — seule route réellement admin-only, déjà protégée
    # aussi par ADMIN_SECRET_KEY côté application (double couche volontaire).
    location ~ ^/system(/|$) {
        auth_basic "KORA — Accès administrateur système";
        auth_basic_user_file /etc/nginx/kora.htpasswd;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
