services:
  - type: web
    name: kora-api
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DEBUG
        value: "false"
      # Les autres variables sont injectées via le dashboard Render
      # pour ne jamais les exposer dans ce fichier
    healthCheckPath: /health
    autoDeploy: true
